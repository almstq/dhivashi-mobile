name: Build Customer APK
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
      with:
        channel: stable
    - name: Install Melos
      run: dart pub global activate melos
    - name: Bootstrap
      run: cd mobile && melos bootstrap
    - name: Build APK
      run: cd mobile/customer && flutter build apk --release --flavor customer
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: dhivashi-customer.apk
        path: mobile/customer/build/app/outputs/flutter-apk/app-customer-release.apk
