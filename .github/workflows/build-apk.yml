name: Build Customer APK

on:
  push:
    branches: [ main ]
    paths:
      - 'mobile/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.0' # Adjust based on 4.x release availability

      - name: Install Melos
        run: dart pub global activate melos

      - name: Bootstrap Workspace
        working-directory: ./mobile
        run: melos bootstrap

      - name: Build APK (Customer)
        working-directory: ./mobile/customer
        run: flutter build apk --release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dhivashi-customer-release-apk
          path: mobile/customer/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
